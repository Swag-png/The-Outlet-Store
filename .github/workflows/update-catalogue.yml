name: Update Catalogue

on:
  schedule:
    # Every Monday 06:00 UTC (08:00 SAST)
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper (products + images)
        run: node scraper.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet products.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name  "Outlet Store Bot"
          git config --global user.email "bot@outlet.co.za"
          git add products.js
          git commit -m "Auto-update: new products + images $(date +'%Y-%m-%d')"
          git push
