<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Outlet Store</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg:#0a0a0a; --surf:#111; --card:#161616; --border:#222;
  --gold:#c8a84b; --gold2:#7a6428; --text:#eee8df; --muted:#666;
  --wa:#25d366; --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:var(--text);white-space:nowrap}
.nav-logo span{color:var(--gold)}
.nav-search{flex:1;max-width:380px;position:relative}
.nav-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
#search{width:100%;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font:400 13px 'DM Sans',sans-serif;outline:none;transition:border-color .15s}
#search:focus{border-color:var(--gold)}
#search::placeholder{color:var(--muted)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-count{font-size:11px;color:var(--muted);white-space:nowrap}
.nav-count strong{color:var(--gold)}
.wa-btn{display:flex;align-items:center;gap:6px;background:var(--wa);color:#fff;padding:8px 14px;border-radius:8px;font:600 12px 'DM Sans',sans-serif;text-decoration:none;letter-spacing:.03em;transition:opacity .15s;white-space:nowrap}
.wa-btn:hover{opacity:.88}
.wa-btn svg{flex-shrink:0}

/* HERO */
.hero{padding:48px 24px 32px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'THE OUTLET';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(60px,12vw,140px);color:rgba(200,168,75,.04);letter-spacing:-.04em;white-space:nowrap;pointer-events:none}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,5vw,48px);letter-spacing:.02em;line-height:1.1;margin-bottom:12px}
.hero h1 span{color:var(--gold)}
.hero p{font-size:14px;color:var(--muted);max-width:420px;margin:0 auto 24px;line-height:1.7}
.hero-wa{display:inline-flex;align-items:center;gap:8px;background:var(--wa);color:#fff;padding:14px 28px;border-radius:10px;font:600 14px 'DM Sans',sans-serif;text-decoration:none;letter-spacing:.04em;transition:opacity .15s}
.hero-wa:hover{opacity:.88}

/* FILTERS */
.filters{padding:0 24px 0;position:sticky;top:58px;z-index:90;background:var(--bg);border-bottom:1px solid var(--border)}
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 0;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font:400 12px 'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{color:var(--text);border-color:#444}
.chip.active{background:rgba(200,168,75,.1);border-color:var(--gold);color:var(--gold)}

/* GRID */
.grid-wrap{padding:24px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.5);border-color:var(--gold2)}
/* IMAGE CAROUSEL */
.card-imgs{position:relative;height:200px;overflow:hidden;background:#0f0f0f;cursor:pointer}
.card-imgs-inner{display:flex;height:100%;transition:transform .3s ease}
.card-img-slide{flex-shrink:0;width:100%;height:100%;object-fit:cover;background:#0f0f0f}
.card-img-placeholder{flex-shrink:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:40px;opacity:.15}
.card-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .2s}
.dot.active{background:var(--gold)}
.card-nav{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;background:rgba(0,0,0,.5);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.card:hover .card-nav{opacity:1}
.card-nav-prev{left:8px}
.card-nav-next{right:8px}
/* BODY */
.card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.card-brand{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:600}
.card-name{font-size:13px;line-height:1.4;color:var(--text);flex:1;margin-bottom:14px}
.card-footer{border-top:1px solid var(--border);padding-top:12px;display:flex;align-items:center;justify-content:flex-end}
.card-wa{display:flex;align-items:center;gap:6px;background:var(--wa);color:#fff;padding:8px 14px;border-radius:7px;font:600 12px 'DM Sans',sans-serif;text-decoration:none;letter-spacing:.03em;transition:opacity .15s;width:100%;justify-content:center}
.card-wa:hover{opacity:.85}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty .icon{font-size:40px;margin-bottom:12px}

/* FOOTER */
footer{margin-top:60px;border-top:1px solid var(--border);padding:32px 24px;text-align:center}
footer p{font-size:12px;color:var(--muted);line-height:2}
.footer-wa{display:inline-flex;align-items:center;gap:6px;color:var(--wa);text-decoration:none;font-weight:600}

@media(max-width:640px){
  #grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .card-imgs{height:170px}
  nav{padding:0 16px}
  .grid-wrap,.filters{padding-left:16px;padding-right:16px}
}
</style>
</head>

    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<script src="products.js"></script>
<script>
const WA = '27676853057';
let activeChip = 'All';
const CHIPS = ['All','Jordan','Nike','Balenciaga','New Balance','Margiela','Rick Owens','Adidas / Yeezy','Asics','Puma','Converse','Vans','Salomon','Hoka','Saucony','On Running','Onitsuka Tiger','Golden Goose','Bape','Amiri','Valentino','Dior','Gucci','Prada','Loewe','Burberry','Timberland','Birkenstock','UGG','Crocs','Bags'];

// build chips
const chipWrap = document.getElementById('chips');
CHIPS.forEach(c => {
  const el = document.createElement('button');
  el.className = 'chip' + (c==='All'?' active':'');
  el.textContent = c;
  el.onclick = () => { activeChip=c; document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); el.classList.add('active'); render(); };
  chipWrap.appendChild(el);
});

function waMsg(name) {
  return `https://wa.me/${WA}?text=${encodeURIComponent('Hi! I\'d like to enquire about:\n\n*' + name + '*\n\nPlease let me know availability.')}`;
}

function matchChip(p, chip) {
  if (chip === 'All') return true;
  if (chip === 'Bags') return p.cat.toLowerCase().includes('bag') || p.tags.includes('bag');
  if (chip === 'Jordan') return p.brand === 'Nike' && (p.cat.toLowerCase().includes('jordan') || p.cat.toLowerCase().includes('kobe') || p.cat.toLowerCase().includes('blazer') || p.cat.toLowerCase().includes('jumpman') || p.cat.toLowerCase().includes('nocta'));
  if (chip === 'Nike') return p.brand === 'Nike' && !matchChip(p,'Jordan');
  if (chip === 'Adidas / Yeezy') return p.brand === 'Adidas' || p.cat === 'Yeezy';
  if (chip === 'On Running') return p.brand === 'On Running';
  if (chip === 'Onitsuka Tiger') return p.brand === 'Onitsuka Tiger';
  if (chip === 'Golden Goose') return p.brand === 'Golden Goose';
  if (chip === 'Rick Owens') return p.brand === 'Rick Owens';
  return p.brand.toLowerCase().includes(chip.toLowerCase()) || p.cat.toLowerCase().includes(chip.toLowerCase());
}

function buildCard(p) {
  const abbr = p.brand.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
  const hasImgs = p.imgs && p.imgs.length > 0;
  let imgHtml = '';
  let dotsHtml = '';
  let navHtml = '';
  if (hasImgs) {
    imgHtml = p.imgs.map(src => `<img class="card-img-slide" src="${src}" loading="lazy" alt="${p.name}" onerror="this.style.display='none'">`).join('');
    if (p.imgs.length > 1) {
      dotsHtml = `<div class="card-dots">${p.imgs.map((_,i)=>`<div class="dot${i===0?' active':''}"></div>`).join('')}</div>`;
      navHtml = `<button class="card-nav card-nav-prev" onclick="slide(event,'${p.id}',-1)">‹</button><button class="card-nav card-nav-next" onclick="slide(event,'${p.id}',1)">›</button>`;
    }
  } else {
    imgHtml = `<div class="card-img-placeholder" style="color:${p.color}">${abbr}</div>`;
  }
  return `<div class="card" id="card-${p.id}">
    <div class="card-imgs" data-id="${p.id}" data-idx="0" onclick="openLink('${p.url}')">
      <div class="card-imgs-inner" id="imgs-${p.id}">${imgHtml}</div>
      ${dotsHtml}${navHtml}
    </div>
    <div class="card-body">
      <div class="card-brand">${p.brand}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-footer">
        <a class="card-wa" href="${waMsg(p.name)}" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enquire
        </a>
      </div>
    </div>
  </div>`;
}

function slide(e, id, dir) {
  e.stopPropagation();
  const wrap = document.getElementById('imgs-'+id);
  if (!wrap) return;
  const slides = wrap.querySelectorAll('.card-img-slide');
  if (!slides.length) return;
  const container = wrap.parentElement;
  let idx = parseInt(container.dataset.idx || 0);
  idx = (idx + dir + slides.length) % slides.length;
  container.dataset.idx = idx;
  wrap.style.transform = `translateX(-${idx*100}%)`;
  const dots = container.querySelectorAll('.dot');
  dots.forEach((d,i) => d.classList.toggle('active', i===idx));
}

function openLink(url) { window.open(url,'_blank','noopener'); }

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const items = PRODUCTS.filter(p => {
    const chipMatch = matchChip(p, activeChip);
    const qMatch = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q) || p.tags.some(t=>t.includes(q));
    return chipMatch && qMatch;
  });
  document.getElementById('count').textContent = items.length;
  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>No items found. Try a different search.</p></div>`;
    return;
  }
  grid.innerHTML = items.map(buildCard).join('');
}

render();
</script>
</body>
</html>
